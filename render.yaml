services:
  - type: web
    name: grocery-chatbot
    runtime: python
    plan: free # Ensures you stay on the free tier
    buildCommand: ./render-build.sh
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PORT
        value: 5000
      - key: ADMIN_PASSWORD
        sync: false # You will set this manually in the dashboard for security
      - key: FLASK_SECRET_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIMS_SUB
        sync: false
      - key: CRON_SECRET
        sync: false
