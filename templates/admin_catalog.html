<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Manager</title>
    <link rel="stylesheet" href="/static/admin_catalog.css">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <h1>Catalog Manager</h1>
            <div class="top-actions">
                <a class="btn" href="/admin">Order Dashboard</a>
                <a class="btn" href="/">Chat</a>
            </div>
        </header>

        <section class="card">
            <h2>Add Category</h2>
            <form id="categoryForm" class="grid-form">
                <input id="categoryName" type="text" placeholder="Example: bakery" required>
                <button type="submit" class="btn primary">Add Category</button>
            </form>
        </section>

        <section class="card">
            <h2>Add / Edit Product</h2>
            <form id="productForm" class="grid-form">
                <input id="productId" type="hidden">
                <input id="productName" type="text" placeholder="Product name" required>
                <select id="categorySelect" required></select>
                <input id="productPrice" type="number" min="1" step="0.01" placeholder="Price per unit" required>
                <select id="productUnit" required>
                    <option value="kg">kg</option>
                    <option value="g">g</option>
                    <option value="litre">litre</option>
                    <option value="ml">ml</option>
                    <option value="piece">piece</option>
                    <option value="packet">packet</option>
                    <option value="dozen">dozen</option>
                </select>
                <input id="productAliases" type="text" placeholder="Aliases (comma separated)">
                <div class="inline-actions">
                    <button type="submit" class="btn primary" id="saveProductBtn">Save Product</button>
                    <button type="button" class="btn" id="cancelEditBtn">Cancel Edit</button>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Current Catalog</h2>
            <p id="statusText" class="status"></p>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Unit</th>
                            <th>Aliases</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="productRows"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="/static/admin_catalog.js"></script>
</body>
</html>
